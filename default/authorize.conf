# authorize.conf — API Connect
# Permessi per le capability dell'app.

[role_api_connect_admin]
importRoles = power
srchIndexesAllowed = *
srchIndexesDefault = *
# Può gestire input, credenziali e configurazione
capability.edit_modinput_api_connect = enabled
capability.edit_storage_passwords = enabled

[role_api_connect_user]
importRoles = user
# Può solo visualizzare la dashboard
capability.edit_modinput_api_connect = disabled
