# savedsearches.conf v3 — API Connect

# ── Dashboard: stato input con metriche live ─────────────────
[API Connect - Stato input v3]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  | rex field=source "api_connect:(?<input_name>[^:]+)" \
  | eval status=if(like(message,"%Errore%") OR level="ERROR","ERROR",\
      if(like(message,"%CB_OPEN%"),"CB_OPEN","OK")) \
  | rex field=message "records=(?<records>\d+)" \
  | rex field=message "elapsed_ms=(?<ms>\d+)" \
  | stats latest(_time) as last_run latest(status) as last_status \
          latest(records) as last_count latest(ms) as last_latency_ms \
    by input_name \
  | eval last_run=strftime(last_run,"%Y-%m-%d %H:%M:%S")
dispatch.earliest_time = -1h
dispatch.latest_time   = now
is_visible             = false

# ── Alert: input in errore ───────────────────────────────────
[API Connect - Alert errore]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* level=ERROR \
  | rex field=source "api_connect:(?<input_name>[^:]+)" \
  | stats count as errors latest(message) as last_error by input_name \
  | where errors > 0
dispatch.earliest_time = -15m
dispatch.latest_time   = now
alert.track            = true
alert.severity         = 3
alert.condition        = count > 0
is_visible             = true
description            = Input API Connect in stato di errore nell'ultimo quarto d'ora.

# ── Alert: circuit breaker aperto ───────────────────────────
[API Connect - Alert circuit breaker]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  like(message,"%Circuit%OPEN%") \
  | rex field=source "api_connect:(?<input_name>[^:]+)" \
  | stats count by input_name
dispatch.earliest_time = -15m
dispatch.latest_time   = now
alert.track            = true
alert.severity         = 2
alert.condition        = count > 0
is_visible             = true
description            = Circuit breaker aperto su uno o più input API Connect.

# ── Monitor esecuzioni ───────────────────────────────────────
[API Connect - Monitor esecuzioni v3]
search = index=_internal sourcetype=custom_script_logger source="api_connect:*" \
  | rex field=source "api_connect:(?<input_name>[^:]+):(?<component>.+)" \
  | eval status=case( \
      like(message,"%CB_OPEN%"),"CB_OPEN", \
      like(message,"%Errore%") OR level="ERROR","ERROR", \
      like(message,"%Completato%"),"OK", \
      true(),"INFO") \
  | rex field=message "records=(?<records>\d+)" \
  | rex field=message "elapsed_ms=(?<ms>\d+)" \
  | table _time input_name status records ms message \
  | sort -_time
dispatch.earliest_time = -24h
dispatch.latest_time   = now
is_visible             = true
description            = Monitoraggio esecuzioni ultime 24h con status, record e latenza.

# ── Tracciato eventi ─────────────────────────────────────────
[API Connect - Tracciato standard]
search = tag=api_connect \
  | table _time time hostname nomeapp tipoazione clientip username \
          tipooperazione valorePrima valoreDP target note \
          sourcetype source index
dispatch.earliest_time = -24h
dispatch.latest_time   = now
is_visible             = true

# ── Latenza media per input ──────────────────────────────────
[API Connect - Latenza per input]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  | rex field=message "elapsed_ms=(?<ms>\d+)" \
  | rex field=source "api_connect:(?<input>[^:]+)" \
  | where isnotnull(ms) \
  | stats avg(ms) as avg_ms p95(ms) as p95_ms max(ms) as max_ms count as runs by input \
  | eval avg_ms=round(avg_ms,0) | eval p95_ms=round(p95_ms,0)
dispatch.earliest_time = -7d
dispatch.latest_time   = now
is_visible             = true
description            = Latenza media, p95 e massima per ogni input negli ultimi 7 giorni.
