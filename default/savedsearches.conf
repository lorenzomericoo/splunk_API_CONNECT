# savedsearches.conf — API Connect
# Ricerche salvate usate dalla dashboard e per alerting.

# ── Dashboard: stato ultimo run per ogni input ──────────────────────────────
[API Connect - Stato input]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  | rex field=source "api_connect:(?<input_name>[^:]+)" \
  | eval status=if(like(message, "%Errore%") OR level="ERROR", "ERROR", "OK") \
  | stats latest(_time) as last_run latest(status) as last_status by input_name \
  | eval last_run=strftime(last_run,"%Y-%m-%d %H:%M:%S")
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = false
display.general.type = statistics

# ── Dashboard: log inviati per input (ultimo intervallo) ────────────────────
[API Connect - Log per input]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  | rex field=message "records=(?<records>\d+)" \
  | rex field=source "api_connect:(?<input_name>[^:]+)" \
  | where isnotnull(records) \
  | stats sum(records) as total_records latest(_time) as last_run by input_name \
  | eval last_run=strftime(last_run,"%Y-%m-%d %H:%M:%S")
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = false
display.general.type = statistics

# ── Dashboard: latenza media per input ─────────────────────────────────────
[API Connect - Latenza input]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  | rex field=message "elapsed_ms=(?<elapsed_ms>\d+)" \
  | rex field=source "api_connect:(?<input_name>[^:]+)" \
  | where isnotnull(elapsed_ms) \
  | stats avg(elapsed_ms) as avg_latency_ms latest(elapsed_ms) as last_latency_ms by input_name
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = false
display.general.type = statistics

# ── Alert: input in errore ──────────────────────────────────────────────────
[API Connect - Alert input in errore]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* level=ERROR \
  | rex field=source "api_connect:(?<input_name>[^:]+):(?<component>\S+)" \
  | stats count as error_count latest(message) as last_error by input_name \
  | where error_count > 0
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.track = true
alert.severity = 3
alert.condition = count > 0
is_visible = true
description = Notifica quando uno o più input API Connect sono in stato di errore nell'ultimo quarto d'ora.

# ── Alert: nessun dato ricevuto da input attivo ─────────────────────────────
[API Connect - Alert nessun dato]
search = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  | rex field=message "records=(?<records>\d+)" \
  | rex field=source "api_connect:(?<input_name>[^:]+)" \
  | where isnotnull(records) AND records="0" \
  | stats count by input_name
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert.track = true
alert.severity = 2
alert.condition = count > 0
is_visible = true
description = Notifica quando un input ha restituito 0 record in un'ora.

# ── Ricerca di monitoring raccomandata (documentativa) ──────────────────────
[API Connect - Monitor esecuzioni]
search = index=_internal sourcetype=custom_script_logger source="api_connect:*" \
  | rex field=source "api_connect:(?<input_name>[^:]+):(?<component>.+)" \
  | eval status=case( \
      like(message,"%Errore%") OR level="ERROR", "ERROR", \
      like(message,"%Completato%"), "OK", \
      true(), "INFO") \
  | rex field=message "records=(?<records>\d+)" \
  | rex field=message "elapsed_ms=(?<elapsed_ms>\d+)" \
  | table _time input_name status records elapsed_ms message \
  | sort -_time
dispatch.earliest_time = -24h
dispatch.latest_time = now
is_visible = true
description = Panoramica delle esecuzioni di tutti gli input API Connect nelle ultime 24 ore.

# ── Ricerca tracciato standard (documentativa) ──────────────────────────────
[API Connect - Tracciato eventi]
search = tag=api_connect \
  | table _time time hostname nomeapp tipoazione clientip username \
      tipooperazione valorePrima valoreDP target note sourcetype source index
dispatch.earliest_time = -24h
dispatch.latest_time = now
is_visible = true
description = Visualizza gli eventi nel tracciato standard aziendale da tutti gli input API Connect.
