# macros.conf v3 — API Connect

[ac_input(1)]
args       = input_name
definition = sourcetype=api_connect:$input_name$

[ac_logs(1)]
args       = input_name
definition = index=_internal sourcetype=custom_script_logger source=api_connect:$input_name$:*

[ac_logs]
definition = index=_internal sourcetype=custom_script_logger source=api_connect:*

[ac_tracciato]
definition = tag=api_connect \
  | rename time as event_time \
  | eval _time=if(isnotnull(event_time),event_time,_time)

[ac_status]
definition = `ac_logs` \
  | rex field=message "records=(?<records>\d+)" \
  | rex field=message "elapsed_ms=(?<ms>\d+)" \
  | rex field=source "api_connect:(?<input>[^:]+)" \
  | eval status=case(like(message,"%CB_OPEN%"),"CB_OPEN",level="ERROR","ERROR",true(),"OK") \
  | stats latest(_time) as last_run latest(status) as status \
          latest(records) as records latest(ms) as latency_ms \
    by input

[ac_cb_status]
definition = index=_internal sourcetype=custom_script_logger source=api_connect:* \
  like(message,"%circuit%") \
  | rex field=source "api_connect:(?<input>[^:]+)" \
  | rex field=message "circuit=(?<cb_state>\w+)" \
  | stats latest(cb_state) as cb_state by input \
  | eval status_class=case(cb_state="CLOSED","ok",cb_state="OPEN","error",true(),"warn")
