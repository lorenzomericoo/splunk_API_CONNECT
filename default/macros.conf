# macros.conf — API Connect
# Macro SPL per ricerche comuni, usabili in qualsiasi dashboard o search.

# Tutti gli eventi di un input specifico
[ac_input(1)]
args = input_name
definition = sourcetype=api_connect:$input_name$
iseval = false

# Log di esecuzione di un input
[ac_logs(1)]
args = input_name
definition = index=_internal sourcetype=custom_script_logger source=api_connect:$input_name$:*
iseval = false

# Tutti i log API Connect
[ac_logs]
definition = index=_internal sourcetype=custom_script_logger source=api_connect:*
iseval = false

# Tracciato standard completo
[ac_tracciato]
definition = tag=api_connect | rename time as event_time | eval _time=if(isnotnull(event_time),event_time,_time)
iseval = false

# Stato corrente di tutti gli input
[ac_status]
definition = `ac_logs` | rex field=message "records=(?<records>\d+)" | rex field=message "elapsed_ms=(?<ms>\d+)" | rex field=source "api_connect:(?<input>[^:]+)" | eval status=if(level="ERROR","ERROR","OK") | stats latest(_time) as last_run latest(status) as status latest(records) as records latest(ms) as latency_ms by input
iseval = false
